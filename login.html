<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DELICART Hub — Đăng nhập</title>
<style>
:root{color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:linear-gradient(135deg,#1a73e8 0%,#0d47a1 100%);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.card{background:#fff;border-radius:16px;padding:40px;width:100%;max-width:380px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
.logo{text-align:center;margin-bottom:32px}
.logo h1{font-size:26px;font-weight:800;color:#1a73e8;letter-spacing:-0.5px}
.logo p{font-size:13px;color:#5f6368;margin-top:4px}
.form-group{margin-bottom:18px}
label{display:block;font-size:12px;font-weight:600;color:#3c4043;margin-bottom:6px;text-transform:uppercase;letter-spacing:.5px}
input{width:100%;padding:11px 14px;border:1.5px solid #e8eaed;border-radius:8px;font-size:14px;color:#202124;transition:.15s;outline:none}
input:focus{border-color:#1a73e8;box-shadow:0 0 0 3px rgba(26,115,232,.12)}
.btn{width:100%;padding:12px;background:#1a73e8;color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.15s;margin-top:6px}
.btn:hover{background:#1557b0}
.btn:active{background:#0d47a1}
.btn:disabled{background:#9aa0a6;cursor:not-allowed}
.error{background:#fce8e6;border:1px solid #f5c6c4;border-radius:8px;padding:10px 14px;color:#c5221f;font-size:13px;margin-top:14px;display:none}
.footer{text-align:center;margin-top:24px;font-size:11px;color:#9aa0a6}
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <h1>🏪 DELICART</h1>
    <p>Command Hub — Trung tâm điều hành</p>
  </div>

  <form id="form" onsubmit="login(event)">
    <div class="form-group">
      <label>Tài khoản</label>
      <input type="text" id="username" placeholder="Nhập tài khoản" autocomplete="username" required>
    </div>
    <div class="form-group">
      <label>Mật khẩu</label>
      <input type="password" id="password" placeholder="Nhập mật khẩu" autocomplete="current-password" required>
    </div>
    <button class="btn" type="submit" id="btn">Đăng nhập</button>
    <div class="error" id="err"></div>
  </form>

  <div class="footer">DELICART Internal Hub · Chỉ dành cho nội bộ</div>
</div>

<script>
// Nếu đã đăng nhập rồi, chuyển thẳng vào dashboard
if (localStorage.getItem('hub_token')) {
  window.location.href = '/dashboard';
}

async function login(e) {
  e.preventDefault();
  const btn = document.getElementById('btn');
  const err = document.getElementById('err');
  err.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Đang đăng nhập...';

  try {
    const res = await fetch('/api/auth', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: document.getElementById('username').value.trim(),
        password: document.getElementById('password').value
      })
    });

    const data = await res.json();

    if (!res.ok) {
      err.textContent = data.error || 'Đăng nhập thất bại';
      err.style.display = 'block';
      return;
    }

    localStorage.setItem('hub_token', data.token);
    localStorage.setItem('hub_user', data.username);
    window.location.href = '/dashboard';
  } catch (ex) {
    err.textContent = 'Lỗi kết nối: ' + ex.message;
    err.style.display = 'block';
  } finally {
    btn.disabled = false;
    btn.textContent = 'Đăng nhập';
  }
}
</script>
</body>
</html>
